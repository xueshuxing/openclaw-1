name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Play Debug APK
        run: |
          cd apps/android
          chmod +x gradlew
          ./gradlew :app:assemblePlayDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-play-debug
          path: apps/android/app/build/outputs/apk/play/debug/*.apk
